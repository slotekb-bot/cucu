# h-manifest.conf — общий конфиг для HiveOS (не для самого майнера)
CUSTOM_NAME=epic-miner
CUSTOM_VERSION=1.4.0
# Полный путь к генерируемому конфигу майнера
CUSTOM_CONFIG_FILENAME=/hive/miners/custom/epic-miner/epic-miner.toml
# Базовое имя лог-файла БЕЗ расширения .log — Hive сам добавит .log и будет ротировать
CUSTOM_LOG_BASENAME=/var/log/miner/epic-miner/epic-miner
